name: Zenodo drift check (reusable)

# Reusable workflow: alert if the latest GitHub release isn't the latest version
# on Zenodo. Concept comes from the repo's CITATION.cff. Reads only public APIs —
# no secrets required. Call it from a target repo on a schedule:
#
#   on:
#     schedule: [{ cron: '0 12 * * 1' }]
#   jobs:
#     drift:
#       uses: virtualcell/zenodo-maint/.github/workflows/drift.reusable.yml@v1.5.0

on:
  workflow_call:
    inputs:
      concept_recid: { type: string, required: false, default: '' } # override CITATION.cff
      ref: { type: string, required: false, default: 'v1' }

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # for CITATION.cff
      - name: Install zenodo-maint
        env:
          REF: ${{ inputs.ref }}
        run: pipx install "git+https://github.com/virtualcell/zenodo-maint@${REF}"
      - name: Check drift
        id: check
        env:
          CONCEPT: ${{ inputs.concept_recid }}
        run: |
          set -uo pipefail
          global=()
          [ -n "$CONCEPT" ] && global+=(--concept "$CONCEPT")
          # exit 0 = in sync, 2 = drift, other = check error (do NOT mislabel as drift)
          code=0
          out=$(zenodo-maint "${global[@]}" check-drift 2>&1) || code=$?
          echo "$out"
          gh_ver=$(printf '%s\n' "$out" | sed -n 's/.*GitHub release *: *//p' | head -1)
          zen_ver=$(printf '%s\n' "$out" | sed -n 's/.*Zenodo version *: *//p' | head -1)
          {
            echo "gh_ver=${gh_ver:-?}"
            echo "zen_ver=${zen_ver:-?}"
            case $code in
              0) echo "state=ok" ;;
              2) echo "state=drift" ;;
              *) echo "state=error" ;;
            esac
          } >> "$GITHUB_OUTPUT"
      - name: Open or update tracking issue
        if: steps.check.outputs.state != 'ok'
        env:
          GH_TOKEN: ${{ github.token }}
          STATE: ${{ steps.check.outputs.state }}
          GH_VER: ${{ steps.check.outputs.gh_ver }}
          ZEN_VER: ${{ steps.check.outputs.zen_ver }}
        run: |
          set -euo pipefail
          if [ "$STATE" = "drift" ]; then
            title="Zenodo release archiving has drifted"
          else
            title="Zenodo drift check errored"
          fi
          {
            echo "State: **${STATE}**"
            echo ""
            echo "| | Version |"
            echo "|---|---|"
            echo "| Latest GitHub release | \`${GH_VER}\` |"
            echo "| Latest Zenodo version | \`${ZEN_VER}\` |"
            echo ""
            echo "If **drift**: the release→Zenodo archiving pipeline may have stopped"
            echo "(expired token, revoked OAuth grant, or a disabled/forking integration)."
            echo "If **error**: the check itself failed — see the run logs."
            echo ""
            echo "_Filed automatically by the zenodo-maint drift check._"
          } > body.md
          num=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh issue comment "$num" --body "Still ${STATE}: GitHub \`${GH_VER}\` vs Zenodo \`${ZEN_VER}\`."
          else
            gh issue create --title "$title" --body-file body.md
          fi
          exit 1

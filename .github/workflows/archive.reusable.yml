name: Zenodo archive (reusable)

# Reusable workflow: archive a published release as a new version of the repo's
# Zenodo concept record. Concept + metadata come from the repo's CITATION.cff and
# .zenodo.json, so callers usually only pass the tag. Call it from a target repo:
#
#   jobs:
#     archive:
#       uses: virtualcell/zenodo-maint/.github/workflows/archive.reusable.yml@v1
#       with:
#         tag: ${{ github.event.release.tag_name }}
#       secrets:
#         ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}

on:
  workflow_call:
    inputs:
      tag: { type: string, required: false, default: 'latest' }
      concept_recid: { type: string, required: false, default: '' } # override CITATION.cff
      ref: { type: string, required: false, default: 'v1' } # zenodo-maint version
    secrets:
      ZENODO_TOKEN: { required: true }

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # for CITATION.cff / .zenodo.json
      - name: Install zenodo-maint
        env:
          REF: ${{ inputs.ref }}
        run: pipx install "git+https://github.com/virtualcell/zenodo-maint@${REF}"
      - name: Archive release
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          CONCEPT: ${{ inputs.concept_recid }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          global=()
          [ -n "$CONCEPT" ] && global+=(--concept "$CONCEPT")
          zenodo-maint "${global[@]}" archive-release --tag "$TAG" --execute
